<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweeter | Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <button onclick="window.location.href='main.html'">Home</button>
        <h1 class="title">Tweeter</h1>
        <div class="registerComponents">
            <button onclick="window.location.href='login.html'">Login</button>
            <button onclick="window.location.href='signup.html'">Sign up</button>
        </div>
    </div>

    <div class="form-page">
        <div class="form-card">
            <h2>Welcome back</h2>
            <p class="form-subtitle">Sign in to your Tweeter account</p>

            <div id="errorMsg" class="form-error" style="display:none"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="@yourhandle" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="form-submit-btn" id="submitBtn">Log in</button>
            </form>

            <p class="form-footer">
                Don't have an account? <span class="link" onclick="window.location.href='signup.html'">Sign up</span>
            </p>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const errorEl = document.getElementById("errorMsg");
            errorEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Logging in...";

            const body = {
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value,
            };

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.error || "Login failed";
                    errorEl.style.display = "block";
                    btn.disabled = false;
                    btn.textContent = "Log in";
                    return;
                }
                window.location.href = "main.html";
            } catch {
                errorEl.textContent = "Network error — please try again";
                errorEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Log in";
            }
        });
    </script>
</body>
</html>
