<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweeter | Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <button class="createPost">Create post</button>
        <h1 class="title">Tweeter</h1>
        <div class="registerComponents" id="authButtons">
            <!-- filled by JS based on login state -->
        </div>
    </div>

    <div class="content">
        <section class="section1"></section>

        <section class="feed">
            <h2 class="feed-title">Posts</h2>
            <div id="feedContent">
                <p class="loading-msg">Loading posts...</p>
            </div>
        </section>

        <section class="section3"></section>
    </div>

    <script src="index.js"></script>
</body>
</html>
